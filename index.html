<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>MECHA KAIJU RUSH</title>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      width:100%; height:100%;
      background:#0a0a0f;
      overflow:hidden;
    }
    #game-container {
      width:100%; height:100%;
      display:flex; align-items:center; justify-content:center;
    }
    #fallback {
      position:fixed; inset:0;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      color:#ff4d00; font-family:monospace; font-size:24px;
      background:#0a0a0f; z-index:1;
    }
    #fallback.hidden { display:none; }
  </style>
</head>
<body>
  <div id="fallback">
    <div>⏳ Loading MECHA KAIJU RUSH...</div>
    <div id="err" style="color:#ff0000;font-size:16px;margin-top:20px"></div>
  </div>
  <div id="game-container"></div>

  <script>
    window.onerror = function(msg, src, line) {
      document.getElementById('err').innerText = 'ERROR: ' + msg + ' (line ' + line + ')';
    };
    window.onunhandledrejection = function(e) {
      document.getElementById('err').innerText = 'ERROR: ' + e.reason;
    };
  </script>
  <script type="module" src="./game.js"></script>
</body>
</html>
